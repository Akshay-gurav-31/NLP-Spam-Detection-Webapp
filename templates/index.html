<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spam Detector AI</title>
    <meta name="description"
        content="AI-powered spam detection using Naive Bayes and TF-IDF. Instantly classify any message as spam or legitimate." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        /* ─────────────────────────────────────────
       Design Tokens — Bright Light Theme
       Primary palette: Blue #2563eb
       Surface hierarchy: white → slate-50 → slate-100
    ───────────────────────────────────────── */
        :root {
            --bg: #f8fafc;
            /* page background  */
            --surface: #ffffff;
            /* main card        */
            --surface-muted: #f1f5f9;
            /* input background */
            --surface-hover: #e2e8f0;
            /* input focused bg */
            --border: #e2e8f0;
            /* subtle dividers  */
            --border-focus: #2563eb;
            /* focus ring       */

            --primary: #2563eb;
            /* brand blue       */
            --primary-dark: #1d4ed8;
            /* button hover     */
            --on-primary: #ffffff;

            --text-heading: #0f172a;
            /* slate-900        */
            --text-body: #334155;
            /* slate-700        */
            --text-muted: #64748b;
            /* slate-500        */
            --text-placeholder: #94a3b8;
            /* slate-400        */

            --spam-bg: #fff7ed;
            /* orange-50        */
            --spam-border: #fed7aa;
            /* orange-200       */
            --spam-text: #c2410c;
            /* orange-700       */
            --spam-gauge: #ea580c;

            --ham-bg: #f0fdf4;
            /* green-50         */
            --ham-border: #bbf7d0;
            /* green-200        */
            --ham-text: #15803d;
            /* green-700        */
            --ham-gauge: #16a34a;

            --radius-card: 20px;
            --radius-input: 12px;
            --radius-btn: 9999px;
            --radius-badge: 9999px;
            --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        }

        /* ─── Reset ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url("{{ url_for('static', filename='images/bg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ─── Wrapper ─── */
        .wrapper {
            width: 100%;
            max-width: 540px;
            animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── Header above the card ─── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #dbeafe;
            /* blue-100 */
            color: var(--primary);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: var(--radius-badge);
            margin-bottom: 14px;
        }

        .chip-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        h1 {
            font-family: 'Manrope', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-heading);
            line-height: 1.1;
        }

        h1 em {
            font-style: normal;
            color: var(--primary);
        }

        .tagline {
            margin-top: 10px;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.55;
        }

        /* ─── Card ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow);
            padding: 36px 36px 32px;
        }

        /* ─── Sample pills ─── */
        .pills-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 22px;
        }

        .pill {
            background: var(--surface-muted);
            color: var(--text-body);
            border: 1px solid var(--border);
            border-radius: var(--radius-badge);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 5px 12px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .pill:hover {
            background: #dbeafe;
            border-color: #93c5fd;
            color: var(--primary);
        }

        /* ─── Textarea ─── */
        .field-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-body);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            min-height: 130px;
            background: var(--surface-muted);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-input);
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.93rem;
            color: var(--text-heading);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            line-height: 1.6;
        }

        textarea::placeholder {
            color: var(--text-placeholder);
        }

        textarea:focus {
            border-color: var(--border-focus);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .field-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .field-meta .hint {
            font-style: italic;
        }

        #charCount.warn {
            color: var(--spam-text);
            font-weight: 600;
        }

        /* ─── Analyse Button ─── */
        #predictBtn {
            width: 100%;
            margin-top: 18px;
            padding: 14px 24px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: var(--radius-btn);
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 2px 10px rgba(37, 99, 235, 0.30);
        }

        #predictBtn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
        }

        #predictBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        #predictBtn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* Spinner inside button */
        .spinner {
            width: 17px;
            height: 17px;
            border: 2.5px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── Result Section ─── */
        #result {
            display: none;
            margin-top: 24px;
            border-radius: 14px;
            padding: 20px 20px 18px;
            animation: rise 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        #result.spam {
            background: var(--spam-bg);
            border: 1px solid var(--spam-border);
        }

        #result.ham {
            background: var(--ham-bg);
            border: 1px solid var(--ham-border);
        }

        .res-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .res-icon {
            font-size: 1.5rem;
            line-height: 1;
        }

        .res-title {
            font-family: 'Manrope', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
        }

        .res-title.spam {
            color: var(--spam-text);
        }

        .res-title.ham {
            color: var(--ham-text);
        }

        /* Confidence gauge */
        .gauge-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gauge-track {
            flex: 1;
            height: 7px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
        }

        .gauge-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.65s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0%;
        }

        .gauge-fill.spam {
            background: var(--spam-gauge);
        }

        .gauge-fill.ham {
            background: var(--ham-gauge);
        }

        .gauge-label {
            font-family: 'Manrope', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            min-width: 44px;
            text-align: right;
        }

        .gauge-label.spam {
            color: var(--spam-text);
        }

        .gauge-label.ham {
            color: var(--ham-text);
        }

        .res-desc {
            margin-top: 12px;
            font-size: 0.83rem;
            color: var(--text-muted);
            line-height: 1.55;
        }

        /* ─── Footer ─── */
        .footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer b {
            color: var(--primary);
        }

        /* ─── Responsive ─── */
        @media (max-width: 520px) {
            .card {
                padding: 24px 18px 22px;
            }

            h1 {
                font-size: 1.9rem;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <!-- ── Page Header ── -->
        <div class="header">
            <h1>Spam Detector</h1>
            <p class="tagline">Enter any SMS or email message below.<br>The model will instantly classify it as
                <strong>Spam</strong> or <strong>Legitimate</strong>.</p>
        </div>

        <!-- ── Main Card ── -->
        <div class="card">

            <!-- Sample messages for quick testing -->
            <p class="pills-label">Try a sample message</p>
            <div class="pills">
                <button class="pill" id="p1">🚨 Win £1000 now!</button>
                <button class="pill" id="p2">Free entry, claim reward</button>
                <button class="pill" id="p3">👋 Hey, lunch at noon?</button>
                <button class="pill" id="p4">Meeting moved to 3 pm</button>
            </div>

            <!-- Message input area -->
            <p class="field-label">Your Message</p>
            <textarea id="messageInput" maxlength="1000" placeholder="Paste an SMS or email message here…"></textarea>
            <div class="field-meta">
                <span class="hint">Ctrl + Enter to analyse</span>
                <span><span id="charCount">0</span> / 1000</span>
            </div>

            <!-- Analyse button -->
            <button id="predictBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Analyse Message</span>
            </button>

            <!-- Classification result -->
            <div id="result">
                <div class="res-row">
                    <div class="res-icon" id="resIcon"></div>
                    <div class="res-title" id="resTitle"></div>
                </div>
                <div class="gauge-wrap">
                    <div class="gauge-track">
                        <div class="gauge-fill" id="gaugeFill"></div>
                    </div>
                    <div class="gauge-label" id="gaugeLabel"></div>
                </div>
                <p class="res-desc" id="resDesc"></p>
            </div>

        </div><!-- /.card -->

        <!-- Footer -->
        <div class="footer">
            <b>TF-IDF Vectorizer</b> + <b>Multinomial Naive Bayes</b> &middot; 96.9% Accuracy
        </div>

    </div><!-- /.wrapper -->

    <script>
        /* ─────────────────────────────────────────
           Sample message lookup table
           Provides quick test data for both spam
           and legitimate (ham) categories.
        ───────────────────────────────────────── */
        const SAMPLES = {
            p1: "WINNER!! You have been selected to receivea £1000 prize reward! To claim call 09061701461. Claim code KL341. Valid 12 hours only.",
            p2: "Free entry in 2 a wkly comp to win FA Cup final tkts 21st May 2005. Text FA to 87121 to receive entry question(std txt rate)T&Cs apply.",
            p3: "Hey, are we still meeting for lunch at noon today? Let me know if it works for you!",
            p4: "Hi team, just a reminder that today's 2 pm meeting has been moved to 3 pm. Same conference room."
        };

        /* Inject sample text into textarea on pill click */
        Object.entries(SAMPLES).forEach(([id, text]) => {
            document.getElementById(id).addEventListener('click', () => {
                document.getElementById('messageInput').value = text;
                updateCount();
                document.getElementById('result').style.display = 'none';
            });
        });

        /* ─── Character counter ─── */
        const input = document.getElementById('messageInput');
        const charSpan = document.getElementById('charCount');

        function updateCount() {
            const n = input.value.length;
            charSpan.textContent = n;
            charSpan.className = n > 900 ? 'warn' : '';
        }
        input.addEventListener('input', updateCount);

        /* ─── Keyboard shortcut: Ctrl + Enter ─── */
        input.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') analyse();
        });

        /* ─── Main prediction handler ─── */
        const btn = document.getElementById('predictBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const result = document.getElementById('result');

        btn.addEventListener('click', analyse);

        async function analyse() {
            const msg = input.value.trim();

            /* Validate: do not send empty input */
            if (!msg) {
                input.focus();
                input.style.borderColor = '#fca5a5'; /* red-300 */
                setTimeout(() => (input.style.borderColor = ''), 1000);
                return;
            }

            /* Set loading state while waiting for the response */
            setLoading(true);
            result.style.display = 'none';

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                if (!res.ok) { alert(data.error || 'Server error. Please try again.'); return; }

                renderResult(data);

            } catch (err) {
                alert('Cannot reach the server. Ensure app.py is running on port 5000.');
                console.error(err);
            } finally {
                setLoading(false);
            }
        }

        /* ─── Toggle loading UI ─── */
        function setLoading(loading) {
            btn.disabled = loading;
            spinner.style.display = loading ? 'block' : 'none';
            btnText.textContent = loading ? 'Analysing…' : 'Analyse Message';
        }

        /* ─── Render classification result ─── */
        function renderResult({ prediction, confidence }) {
            const isSpam = prediction === 'Spam';
            const cls = isSpam ? 'spam' : 'ham';

            /* Apply colour class to result container */
            result.className = cls;
            result.style.display = 'block';

            document.getElementById('resIcon').textContent = isSpam ? '⚠️' : '✅';
            document.getElementById('resTitle').textContent = isSpam ? 'Spam Detected' : 'Looks Legitimate';
            document.getElementById('resTitle').className = 'res-title ' + cls;

            /* Animate the confidence gauge from 0 → value */
            const fill = document.getElementById('gaugeFill');
            const label = document.getElementById('gaugeLabel');
            fill.className = 'gauge-fill ' + cls;
            fill.style.width = '0%';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                fill.style.width = confidence + '%';
            }));
            label.textContent = confidence + '%';
            label.className = 'gauge-label ' + cls;

            /* Contextual description */
            document.getElementById('resDesc').textContent = isSpam
                ? `Model confidence: ${confidence}%. This message contains patterns commonly found in spam — unsolicited offers, urgency cues, or suspicious phone numbers.`
                : `Model confidence: ${confidence}%. This message does not exhibit spam patterns and is likely a legitimate communication.`;
        }
    </script>

</body>

</html>
